finetune:
  # Smallest practical default among requested options
  base_model: google/gemma-2-2b-it
  output_dir: outputs/finetuned
  adapter_dir: outputs/finetuned/adapter
  merged_dir: outputs/finetuned/merged
  train_file: dataset/processed/train.jsonl
  val_file: dataset/processed/val.jsonl
  max_seq_length: 512
  num_train_epochs: 2
  learning_rate: 0.0002
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  seed: 42
  bf16: true
  fp16: false
  gradient_checkpointing: true
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  qlora:
    enabled: false
    use_4bit: false
    bnb_4bit_quant_type: nf4
    bnb_4bit_compute_dtype: bfloat16
